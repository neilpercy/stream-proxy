<!DOCTYPE html>
<html>
<head>
  <title>Live TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

   

    #overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
  color: white;
  font-size: 24px;
  cursor: pointer;
  transition: opacity 0.5s ease;
  z-index: 10; /* 🔥 THIS FIXES IT */
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: contain;
  background: black;
  z-index: 1;
}

   overlay.innerText = "🔊 Turning on sound..."; 

    #error {
      position: absolute;
      color: red;
      top: 10px;
      left: 10px;
    }
  </style>
</head>
<body>

<div id="overlay">🔊 Tap for sound</div>
<div id="error"></div>

<video id="video" autoplay muted playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const errorBox = document.getElementById('error');

  async function start() {
    try {
      console.log("Fetching stream URL...");

      const res = await fetch("https://project-u4q53.vercel.app/api/palmersgreen");
      const data = await res.json();

      console.log("API response:", data);

      if (!data.stream) {
        throw new Error("No stream URL returned");
      }

      const streamUrl = data.stream;

      if (Hls.isSupported()) {
        const hls = new Hls();

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          console.log("Stream ready");
          video.play().catch(() => {});
          overlay.style.display = "flex"; // show overlay ONLY when ready
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error("HLS error:", data);
          errorBox.innerText = "Stream error";
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;

        video.addEventListener('loadedmetadata', () => {
          video.play().catch(() => {});
          overlay.style.display = "flex";
        });
      }

    } catch (err) {
      console.error("Startup error:", err);
      errorBox.innerText = "Error: " + err.message;
    }
  }

  function fadeInAudio() {
    video.muted = false;
    video.volume = 0;

    let vol = 0;
    const interval = setInterval(() => {
      vol += 0.05;
      if (vol >= 1) {
        vol = 1;
        clearInterval(interval);
      }
      video.volume = vol;
    }, 100);
  }

 document.addEventListener("click", () => {
  console.log("User interaction detected");

  fadeInAudio();

  overlay.style.opacity = "0";

  setTimeout(() => {
    overlay.style.display = "none";
  }, 500);
}, { once: true });



document.addEventListener("click", () => console.log("CLICK WORKS"));

  start();
</script>

</body>
</html>
