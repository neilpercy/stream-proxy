<!DOCTYPE html>
<html>
<head>
  <title>Live TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
  }

  video {
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* ✅ FIX */
    background: black;
  }
</style>
</head>
<body>

<div id="loading">Loading live stream...</div>

<video id="video" autoplay playsinline></video>

document.body.addEventListener("click", () => {
  video.muted = false;
});

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  const video = document.getElementById('video');
  const loading = document.getElementById('loading');

  async function start() {
    try {
      // Step 1: get fresh stream URL
      const res = await fetch("https://project-u4q53.vercel.app/api/palmersgreen");
      const data = await res.json();

      const streamUrl = data.stream;

      if (Hls.isSupported()) {
        const hls = new Hls({
          liveSyncDurationCount: 3
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
          loading.style.display = "none";
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
        video.addEventListener('loadedmetadata', () => {
          video.play().catch(() => {});
          loading.style.display = "none";
        });
      }

    } catch (err) {
      console.error(err);
      loading.innerText = "Error loading stream";
    }
  }

  start();
</script>

</body>
</html>
